<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise RAG System</title>
    <!-- Use Tailwind CSS for a premium, clean aesthetic -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-5xl flex flex-col md:flex-row gap-6">
        
        <!-- Sidebar config & upload -->
        <div class="w-full md:w-1/3 glass-panel rounded-2xl p-6 shadow-2xl flex flex-col gap-6">
            <h2 class="text-2xl font-bold gradient-text mb-2">RAG Engine</h2>
            
            <div class="space-y-4">
                <div class="border border-gray-700 rounded-xl p-4 bg-gray-800 bg-opacity-50">
                    <h3 class="text-lg font-medium mb-3 text-gray-200">Upload Document</h3>
                    <form id="uploadForm" class="flex flex-col gap-3">
                        <label class="block">
                            <span class="sr-only">Choose file</span>
                            <input type="file" id="fileInput" name="file" accept=".pdf,.csv" class="block w-full text-sm text-gray-400
                              file:mr-4 file:py-2 file:px-4
                              file:rounded-full file:border-0
                              file:text-sm file:font-semibold
                              file:bg-blue-600 file:text-white
                              hover:file:bg-blue-700 transition"
                            />
                        </label>
                        <button type="submit" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 px-4 rounded-lg shadow-lg font-medium transition duration-200">
                            Upload to Knowledge Base
                        </button>
                    </form>
                    <p id="uploadStatus" class="text-sm mt-3 text-green-400 hidden"></p>
                </div>

                <div class="border border-gray-700 rounded-xl p-4 bg-gray-800 bg-opacity-50">
                    <h3 class="text-lg font-medium mb-3 text-gray-200">System Pipeline</h3>
                    <ul class="text-sm text-gray-400 space-y-2">
                        <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span> Gemini 1.5 + Reranker</li>
                        <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span> Hybrid Vector + BM25</li>
                        <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-purple-500"></span> Query Rewriter</li>
                    </ul>
                </div>

                <button id="evalBtn" class="w-full bg-gray-700 hover:bg-gray-600 border border-gray-600 text-white py-2 px-4 rounded-lg shadow font-medium transition duration-200">
                    Run Pipeline Evaluation
                </button>
                <div id="evalStatus" class="text-xs text-gray-400 hidden p-3 bg-black rounded whitespace-pre-wrap"></div>
            </div>
        </div>

        <!-- Main Chat Panel -->
        <div class="w-full md:w-2/3 glass-panel rounded-2xl flex flex-col shadow-2xl overflow-hidden" style="height: 80vh;">
            <div class="p-4 border-b border-gray-700 bg-gray-800 bg-opacity-50 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-200">Chat Session</h2>
                <div class="text-xs px-3 py-1 bg-green-900 text-green-300 rounded-full border border-green-700">Online</div>
            </div>
            
            <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-6">
                <!-- System message -->
                <div class="flex flex-col items-start gap-1">
                    <div class="px-5 py-3 rounded-2xl rounded-tl-sm bg-gray-800 text-gray-300 text-sm border border-gray-700 max-w-2xl shadow-md">
                        <p>Welcome to the production RAG system. Upload a document to begin, then ask your questions.</p>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-700 bg-gray-800 bg-opacity-50">
                <form id="chatForm" class="flex gap-3 relative">
                    <input type="text" id="chatInput" placeholder="Ask about your documents..." 
                           class="flex-1 bg-gray-900 border border-gray-700 text-white text-sm rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner">
                    <button type="submit" id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl px-5 py-2 font-medium transition shadow-lg flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                    <!-- Loading Spinner -->
                    <div id="chatLoader" class="hidden absolute right-4 top-3 border-2 border-t-blue-500 border-gray-600 rounded-full w-5 h-5 animate-spin"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const sessionId = "session-" + Math.random().toString(36).substr(2, 9);
        const chatBox = document.getElementById('chatBox');
        
        // Append Message Helper
        function appendMessage(sender, text, sources=null) {
            const isBot = sender === 'bot';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col gap-1 ${isBot ? 'items-start' : 'items-end'}`;
            
            let sourceHtml = '';
            if (sources && sources.length > 0) {
                sourceHtml = `<div class="mt-3 pt-3 border-t border-gray-700 w-full">
                    <p class="text-xs font-semibold text-gray-500 mb-2 uppercase">Sources</p>
                    <div class="flex flex-col gap-2">`;
                sources.forEach((s, idx) => {
                    const snippet = s.content.substring(0, 100) + '...';
                    const score = (s.score * 100).toFixed(1);
                    sourceHtml += `<div class="bg-gray-900 p-2 rounded border border-gray-700 text-xs text-gray-400 flex justify-between">
                        <span>[${idx+1}] ${snippet}</span>
                        <span class="text-blue-400 px-1 ml-2">Score: ${score}</span>
                    </div>`;
                });
                sourceHtml += `</div></div>`;
            }

            msgDiv.innerHTML = `
                <div class="${isBot ? 'bg-gray-800 rounded-tl-sm text-gray-300 border-gray-700' : 'bg-blue-600 rounded-tr-sm text-white border-blue-500'} px-5 py-3 rounded-2xl text-sm border max-w-2xl shadow-md whitespace-pre-wrap">
                    ${text}
                    ${sourceHtml}
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Upload Handler
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return;
            
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            btn.innerText = "Processing...";
            btn.disabled = true;
            status.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                status.innerText = data.message || data.error;
                status.classList.remove('hidden');
                status.classList.toggle('text-green-400', res.ok);
                status.classList.toggle('text-red-400', !res.ok);
            } catch (err) {
                status.innerText = "Upload failed.";
                status.classList.remove('hidden');
                status.classList.add('text-red-400');
            } finally {
                btn.innerText = "Upload to Knowledge Base";
                btn.disabled = false;
            }
        });

        // Chat Handler
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text) return;

            appendMessage('user', text);
            input.value = '';
            
            const btn = document.getElementById('sendBtn');
            const loader = document.getElementById('chatLoader');
            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question: text, session_id: sessionId, include_sources: true })
                });
                const data = await res.json();
                
                if(data.answer) {
                    appendMessage('bot', data.answer, data.sources);
                } else if(data.error) {
                    appendMessage('bot', `Error: ${data.error}`);
                }
            } catch(e) {
                appendMessage('bot', 'Network error occurred while fetching response.');
            } finally {
                btn.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        });

        // Evaluation Handler
        document.getElementById('evalBtn').addEventListener('click', async () => {
            const btn = document.getElementById('evalBtn');
            const status = document.getElementById('evalStatus');
            btn.innerText = "Evaluating pipeline...";
            btn.disabled = true;
            status.classList.add('hidden');

            try {
                const res = await fetch('/evaluate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await res.json();
                
                if (res.ok) {
                    status.innerHTML = `Scores:\nFaithfulness: ${data.faithfulness.toFixed(3)}\nRelevance: ${data.answer_relevance.toFixed(3)}\nPrecision: ${data.context_precision.toFixed(3)}\nOverall: ${data.overall_score.toFixed(3)}`;
                } else {
                    status.innerHTML = `Error: ${data.error}`;
                }
                status.classList.remove('hidden');
            } catch(e) {
                status.innerHTML = "Evaluation network error.";
                status.classList.remove('hidden');
            } finally {
                btn.innerText = "Run Pipeline Evaluation";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
