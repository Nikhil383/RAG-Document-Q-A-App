version: '3.8'

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-document-qa
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded documents
      - ./uploads:/app/uploads
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:5000')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
