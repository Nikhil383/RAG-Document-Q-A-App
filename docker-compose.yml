version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: 
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - api
    environment:
      - FASTAPI_URL=http://api:8000/api/v1
